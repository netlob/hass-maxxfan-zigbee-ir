# Lint + type-check + unit tests on every PR / push.
#
# Strategy:
#  - Lint and mypy run once (Python-version-independent enough).
#  - pytest runs across an HA-version matrix: the minimum supported version
#    (so we don't accidentally use newer APIs) and the latest stable.
name: Tests

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          pip install ruff mypy
      - name: ruff format check
        run: ruff format --check .
      - name: ruff lint
        run: ruff check .
      - name: mypy
        run: mypy custom_components/maxxfan

  test:
    name: Tests (HA ${{ matrix.ha-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ha-version:
          - "2025.1.0"
          - latest
    env:
      HA_VERSION: ${{ matrix.ha-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          if [ "$HA_VERSION" != "latest" ]; then
            pip install "homeassistant==$HA_VERSION"
          fi
      - name: pytest
        run: pytest --cov --cov-report=term --cov-report=xml
      - name: Upload coverage
        if: matrix.ha-version == 'latest'
        uses: codecov/codecov-action@v6
        with:
          fail_ci_if_error: false
