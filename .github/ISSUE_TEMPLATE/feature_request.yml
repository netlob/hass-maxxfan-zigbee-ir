name: Feature request
description: Suggest a new transport, supported device, or behaviour.
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have a look at the [Roadmap](https://github.com/netlob/hass-maxxfan-zigbee-ir#roadmap)
        first — if your idea is already on it, give it a 👍 reaction instead of
        opening a duplicate.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case, not just the feature.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you imagine this working from a user's perspective?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else?
